<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twill 9000</title>
    <!--
        Twill 9000 has two surfaces:
          /stage.html   - audience-facing canvas, no chrome
          /control.html - authoring UI (shape picker, FX, export)

        By default, `/` redirects to /stage.html so that any tool
        (e.g. interactive_presenter's AI_VISUALIZER_URL) pointing at
        the root lands on the clean audience surface. Append
        ?mode=control to route to the authoring UI instead.
    -->
    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var mode = params.get('mode');
            var target = mode === 'control' ? 'control.html' : 'stage.html';
            // Preserve the rest of the query string.
            params.delete('mode');
            var suffix = params.toString();
            window.location.replace(target + (suffix ? '?' + suffix : ''));
        })();
    </script>
    <meta http-equiv="refresh" content="0; url=stage.html">
    <style>
        body {
            margin: 0; padding: 0;
            display: flex; align-items: center; justify-content: center;
            height: 100vh;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: #0a0a0a; color: #ccc;
        }
        a { color: #00f2ff; text-decoration: none; margin: 0 12px; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div>
        Twill 9000 &middot;
        <a href="stage.html">Stage</a>
        <a href="control.html">Control</a>
    </div>
</body>
</html>
