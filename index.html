<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Twill 9000 Stage</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
    <link rel="stylesheet" href="css/visualizer.css">
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="sidebar">
        <button id="toggle-sidebar" title="Toggle sidebar">◀</button>
        <div class="panel-content">

        <div class="section">
            <h3>Audio Source</h3>
            <div class="btn-row">
                <button class="btn" id="btn-upload">Upload File</button>
                <button class="btn" id="btn-mic">Mic</button>
            </div>
            <div class="btn-row">
                <button class="btn" id="btn-play">▶ Play</button>
                <button class="btn" id="btn-stop">■ Stop</button>
            </div>
            <div class="row"><label>Volume</label><input type="range" id="vol-slider" min="0" max="1.5" step="0.05" value="0.8"><input type="number" id="vol-slider-num" min="0" max="1.5" step="0.05" value="0.8"></div>
            <div class="row"><label>Seek</label><input type="range" id="seek-bar" min="0" max="100" value="0" step="0.1"></div>
            <div class="status" id="status-text">No audio loaded</div>
            <input type="file" id="file-input" accept="audio/*,.json">
        </div>

        <div class="section">
            <h3>Mode</h3>
            <div class="mode-grid" id="mode-grid"></div>
        </div>

        <div class="section" id="mode-settings-section">
            <h3>Mode Settings</h3>
            <div class="mode-settings active" data-mode="0">
                <div class="row"><label>Bar Count</label><input type="range" id="s-radial-bars" min="6" max="180" step="2" value="90"><input type="number" id="s-radial-bars-num" min="6" max="180" step="2" value="90"></div>
                <div class="row"><label>Inner Radius</label><input type="range" id="s-radial-radius" min="0.1" max="0.5" step="0.05" value="0.25"><input type="number" id="s-radial-radius-num" min="0.1" max="0.5" step="0.05" value="0.25"></div>
                <div class="shape-label">Center Shape</div>
                <div class="shape-grid" id="shape-grid"></div>
                <div class="btn-row">
                    <button class="btn" id="btn-shape-random">Random</button>
                    <button class="btn" id="btn-shape-upload">Upload SVG</button>
                </div>
                <div class="row" id="row-random-change-chance"><label>Change Chance</label><input type="range" id="s-random-change-chance" min="0" max="100" step="1" value="60"><input type="number" id="s-random-change-chance-num" min="0" max="100" step="1" value="60"></div>
                <div class="row" id="row-random-change-cooldown"><label>Cooldown (frames)</label><input type="range" id="s-random-change-cooldown" min="1" max="90" step="1" value="20"><input type="number" id="s-random-change-cooldown-num" min="1" max="90" step="1" value="20"></div>
                <input type="file" id="svg-file-input" accept=".svg" style="display:none;">
                <div class="shape-label" style="margin-top:8px;">Shape Colors</div>
                <div class="color-row">
                    <label>Fill</label>
                    <input type="color" id="s-shape-fill-color" value="#ef213a">
                    <label class="toggle"><input type="checkbox" id="s-shape-fill-auto"><span></span></label>
                    <label style="font-size:10px;color:var(--dim)">Auto</label>
                </div>
                <div class="color-row">
                    <label>Border</label>
                    <input type="color" id="s-shape-stroke-color" value="#1866ee">
                    <label class="toggle"><input type="checkbox" id="s-shape-stroke-auto"><span></span></label>
                    <label style="font-size:10px;color:var(--dim)">Auto</label>
                </div>
                <div class="row"><label>Ring Separation</label><input type="range" id="s-ring-separation" min="0" max="1" step="0.05" value="0.5"><input type="number" id="s-ring-separation-num" min="0" max="1" step="0.05" value="0.5"></div>
                <div class="row"><label>Hollow</label><label class="toggle"><input type="checkbox" id="s-hollow"><span></span></label></div>
                <div class="row"><label>Bar Style</label>
                    <select id="s-bar-style">
                        <option value="bars">Bars</option>
                        <option value="mirror">Mirror</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="section">
            <h3>Background</h3>
            <div class="row"><label>Color</label><input type="color" id="s-bg-color" value="#050505" style="width:50px;height:26px;border:1px solid var(--border);background:none;cursor:pointer;"></div>
            <button class="btn" id="btn-bg-image">Set Background Image</button>
            <button class="btn" id="btn-bg-clear" style="display:none;">Clear Background Image</button>
            <input type="file" id="bg-file-input" accept="image/*">
        </div>

        <div class="section">
            <h3>Visual FX</h3>
            <div class="row"><label>Show Bars</label><label class="toggle"><input type="checkbox" id="s-fx-show-bars" checked><span></span></label></div>
            <div class="row"><label>Rotate</label><label class="toggle"><input type="checkbox" id="s-fx-rotate"><span></span></label></div>
            <div class="row"><label>Rotate Speed</label><input type="range" id="s-fx-rotate-speed" min="0.05" max="2.0" step="0.05" value="0.3"><input type="number" id="s-fx-rotate-speed-num" min="0.05" max="2.0" step="0.05" value="0.3"></div>
            <div class="row"><label>Glow</label><label class="toggle"><input type="checkbox" id="s-fx-glow"><span></span></label></div>
            <div class="row"><label>Glow Strength</label><input type="range" id="s-fx-glow-strength" min="5" max="60" step="1" value="20"><input type="number" id="s-fx-glow-strength-num" min="5" max="60" step="1" value="20"></div>
            <div class="row"><label>Motion Trails</label><label class="toggle"><input type="checkbox" id="s-fx-trails"><span></span></label></div>
            <div class="row"><label>Trail Fade</label><input type="range" id="s-fx-trail-alpha" min="0.02" max="0.4" step="0.01" value="0.12"><input type="number" id="s-fx-trail-alpha-num" min="0.02" max="0.4" step="0.01" value="0.12"></div>
            <div class="row"><label>Pulse Rings</label><label class="toggle"><input type="checkbox" id="s-fx-pulse-rings"><span></span></label></div>
            <div class="row"><label>Particles</label><label class="toggle"><input type="checkbox" id="s-fx-particles"><span></span></label></div>
            <div class="row"><label>Gradient Bars</label><label class="toggle"><input type="checkbox" id="s-fx-gradient-bars"><span></span></label></div>
            <div class="row"><label>Bar Width</label><input type="range" id="s-fx-bar-width" min="1" max="30" step="1" value="4"><input type="number" id="s-fx-bar-width-num" min="1" max="30" step="1" value="4"></div>
            <div class="row"><label>Rounded Bars</label><label class="toggle"><input type="checkbox" id="s-fx-rounded-bars"><span></span></label></div>
            <div class="row"><label>Vignette</label><label class="toggle"><input type="checkbox" id="s-fx-vignette"><span></span></label></div>
            <div class="row"><label>BG Pulse</label><label class="toggle"><input type="checkbox" id="s-fx-bg-pulse"><span></span></label></div>
        </div>

        <div class="section">
            <h3>Voice / Audio</h3>
            <div class="row"><label>Voice Mode</label><label class="toggle"><input type="checkbox" id="s-voice-mode" checked><span></span></label></div>
            <div class="row"><label>Sensitivity</label><input type="range" id="s-sensitivity" min="0.1" max="4.0" step="0.1" value="1.5"><input type="number" id="s-sensitivity-num" min="0.1" max="4.0" step="0.1" value="1.5"></div>
            <div class="row"><label>Smoothing</label><input type="range" id="s-smoothing" min="0.5" max="0.98" step="0.01" value="0.92"><input type="number" id="s-smoothing-num" min="0.5" max="0.98" step="0.01" value="0.92"></div>
            <div class="row"><label>Palette</label>
                <select id="s-palette">
                    <option value="cyan">Cyan / Pink</option>
                    <option value="fire">Fire</option>
                    <option value="ocean">Ocean</option>
                    <option value="sunset">Sunset</option>
                    <option value="arctic">Arctic</option>
                    <option value="gold">Gold</option>
                    <option value="white">White</option>
                </select>
            </div>
        </div>

        <div class="section">
            <h3>Export</h3>
            <button class="btn" id="btn-screenshot">Screenshot (PNG)</button>
            <button class="btn" id="btn-screenshot-alpha">Screenshot (Transparent)</button>
            <button class="btn" id="btn-record-video">Record Video</button>
            <button class="btn" id="btn-record-png">Record PNG Sequence</button>
            <button class="btn" id="btn-export-json">Export Frame Data (JSON)</button>
            <div class="status" id="export-status"></div>
        </div>

        <div class="status" style="text-align:center;margin-top:8px;">Twill 9000 Stage v3.0</div>
        </div>
    </div>

    <div id="drop-overlay">Drop audio file here</div>
    <div id="toast-container"></div>

    <!-- Scripts loaded in dependency order -->
    <script src="js/config.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/visualizer-engine.js"></script>
    <script src="js/exporter.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
