<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Twill 9000 Stage</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
    <link rel="stylesheet" href="css/stage.css">
</head>
<body>
    <canvas id="canvas"></canvas>

    <!-- Shown until the first user gesture unlocks the AudioContext. -->
    <div id="stage-unlock"><span>Click anywhere to activate audio</span></div>

    <!-- Core runtime (no UI). stage-bridge.js owns the boot
         sequence and loads presets/default.json if present.
         We deliberately do NOT load ui.js, exporter.js, or app.js;
         they depend on DOM controls that don't exist here. -->
    <script src="js/config.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/visualizer-engine.js"></script>
    <script src="js/stage-bridge.js"></script>
</body>
</html>
